name: Release please version bump

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Branch main check
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "Workflow is not invoked from main branch."
            exit 1
          fi

      - uses: actions/checkout@v6.0.2

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(jq -r '.version' package.json)
          gh release create "v$version" \
            --title "v$version" --generate-notes

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json and Release-As
        id: bump
        run: |
          original=$(jq -r '.version' package.json)
          npm --no-git-tag-version version minor
          bumped=$(jq -r '.version' package.json)
          git add .
          git commit -m "chore: close $original Release" -m "Release-As: $bumped-rc.0" -n
          git push
          echo "Closed version: $original" >> $GITHUB_STEP_SUMMARY
          echo "New version: $bumped"  >> $GITHUB_STEP_SUMMARY
          echo "Release-As: $bumped-rc.0"  >> $GITHUB_STEP_SUMMARY
